version: '3.8'
services:
  postgres:
    image: ankane/pgvector:latest
    container_name: affine-postgres
    environment:
      POSTGRES_USER: affine
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-affinepass}
      POSTGRES_DB: affine
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U affine"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: affine-redis
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  affine_migration:
    image: ghcr.io/toeverything/affine:stable
    container_name: affine_migration_job
    command: ['sh', '-c', 'node ./scripts/self-host-predeploy.js']
    environment:
      - REDIS_SERVER_HOST=redis
      - DATABASE_URL=postgres://affine:${POSTGRES_PASSWORD:-affinepass}@postgres:5432/affine
    volumes:
      - ./data/affine:/root/.affine/storage
      - ./config:/root/.affine/config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  affine:
    image: ghcr.io/toeverything/affine:stable
    container_name: affine-app
    environment:
      - NODE_ENV=production
      - AFFINE_CONFIG_PATH=/root/.affine/config
      - DATABASE_URL=postgres://affine:${POSTGRES_PASSWORD:-affinepass}@postgres:5432/affine
      - REDIS_SERVER_HOST=redis
      - REDIS_SERVER_PORT=6379
    ports:
      - "80:3010"
    volumes:
      - ./data/affine:/root/.affine/storage
      - ./config:/root/.affine/config
    depends_on:
      affine_migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
